<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
    .box1{
        background-color: yellowgreen;
        width: 250px;
        height: 250px;
        /* margin: 20px; */
        position:absolute;
        left: 100px;
        z-index: 1;
        
    }
.box2{
        background-color: skyblue;
        width: 250px;
        height: 250px;
        /* margin: 20px; */
         position:absolute;
        left: 200px;
        top:80px;
        z-index: 2;
    }
.box3{
        background-color: burlywood;
        width: 250px;
        height: 250px;
        /* margin: 20px; */
         position:absolute;
        left: 300px;
        top: 130px;
        z-index: 3;
    }

   h1 {
    animation: fadeIn 4s;
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }

    to {
        opacity: 1;
    }
}


.box {
    width: 100px;
    height: 100px;
    background: blue;

    animation: moveBox 3s;
}

@keyframes moveBox {
    from {
        transform: translateX(0);
    }

    to {
        transform: translateX(200px);
    }
}

img{
    width:200px;
    

}
    </style>
</head>
<body>

    <div class="box1">

 <div class="box2">

    </div>

     <div class="box3">
     C box
    </div> -->


    <!-- animation -->

    <h1>
        Hello Css
    </h1>

    <div class="box"></div>

    <img src="a.jpeg"/>
</body>
</html>
